name: Sync GeoSite Rule Sets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build Egern rule sets
        run: python scripts/build_geosite.py

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- Egern/generated)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A Egern/generated
          git commit -m "chore: sync geosite rule sets"
          git push
